<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Hub</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      html, body { margin: 0; background: #020617; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; }
      #root:empty::before {
        content: '';
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; pointer-events: none;
      }
      .boot .spinner {
        width: 32px; height: 32px; border: 3px solid #1e293b; border-top-color: #6366f1;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      .boot .msg { font-size: 13px; color: #64748b; }
      .boot .hint { font-size: 11px; color: #475569; margin-top: 8px; }
      .boot .hint code { background: #1e293b; padding: 2px 6px; border-radius: 4px; color: #94a3b8; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Hide boot once React mounts anything */
      #root:not(:empty) ~ .boot { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="boot">
      <div class="spinner"></div>
      <div class="msg">正在加载 Skill Hub...</div>
      <div class="hint">如果这个画面持续不消失，打开 DevTools Console 查看错误，或访问 <code>/api/debug</code></div>
    </div>
    <noscript>
      <div style="padding:24px;color:#f87171">Skill Hub 需要启用 JavaScript。</div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
